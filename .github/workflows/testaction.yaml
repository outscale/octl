name: Build

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/actions/setup_octl/**"
      - ".github/workflows/testaction.yml"

permissions:
  contents: read

jobs:
  latest:
    runs-on: [self-hosted, linux, eu-west-2]
    steps:
    - name: ⬇️ Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: ⬇️ Install octl
      uses: ./.github/actions/setup_octl
      with:
        OSC_ACCESS_KEY: ${{ secrets.OSC_ACCESS_KEY }}
        OSC_SECRET_KEY: ${{ secrets.OSC_SECRET_KEY }}
        OSC_REGION: "eu-west-2"
    - name: 🔎 Test octl
      shell: bash
      run: |
        octl iaas vm ls
  version:
    runs-on: [self-hosted, linux, eu-west-2]
    steps:
    - name: ⬇️ Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: ⬇️ Install octl
      uses: ./.github/actions/setup_octl
      with:
        OSC_ACCESS_KEY: ${{ secrets.OSC_ACCESS_KEY }}
        OSC_SECRET_KEY: ${{ secrets.OSC_SECRET_KEY }}
        OSC_REGION: "eu-west-2"
        version: "v0.0.21"
    - name: 🔎 Test octl
      shell: bash
      run: |
        octl iaas vm ls
