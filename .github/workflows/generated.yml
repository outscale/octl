name: Check generated content

on:
  pull_request:
    branches:
      - main
      - docautogen

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
    - name: ⬇️ Checkout repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    - name: ⚙️ Generate and check diff
      run: |
        set -ex
        go generate ./...
        git add .
        git diff --staged --exit-code
