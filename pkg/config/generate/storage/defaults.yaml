    alias_to: Bucket
    required: true
- entity: object
  use: copy bucket_src/key_src key_dst
  alias_to: CopyObject
  aliases:
  - cp
  short: Copy an object, alias for api CopyObject --CopySource bucket_src/key_src --Key key_dst
  command:
  - api
  - CopyObject
  - --CopySource
  - '%0'
  - --Key
  - '%1'
  - --output
  - success
  flags:
  - name: bucket
    alias_to: Bucket
    required: true
