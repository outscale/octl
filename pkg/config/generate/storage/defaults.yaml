aliases:
- entity: bucket
  use: describe bucket
  alias_to: HeadBucket
  aliases:
  - desc
  short: Display a bucket, alias for api HeadBucket --Bucket bucket
  command:
  - api
  - HeadBucket
  - --Bucket
  - '%0'
  - --output
  - yaml
- entity: object
  use: describe key
  alias_to: HeadObject
  aliases:
  - desc
  short: Display an object metadata, alias for api HeadObject --Key key
  command:
  - api
  - HeadObject
  - --Key
  - '%0'
  - --output
  - yaml
  flags:
  - name: bucket
    alias_to: Bucket
    required: true
- entity: object
  use: versions
  alias_to: ListObjectVersions
  aliases:
  - desc
  short: Display an object metadata, alias for api ListObjectVersions
