  short: alias for api LinkNic --NicId nic_id --VmId vm_id
  command:
  - api
  - LinkNic
  - --NicId
  - '%0'
  - --VmId
  - '%1'
  - --output
  - yaml
  flags:
  - name: device_number
    alias_to: DeviceNumber
    required: true
- entity: netaccesspoint
  group: netaccesspoint
  use: services
  short: alias for api ReadNetAccessPointServices
  command:
  - api
  - ReadNetAccessPointServices
  - --output
  - table
- entity: netpeering
