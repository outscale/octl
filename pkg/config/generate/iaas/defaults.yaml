  - --output
  - success
- entity: netpeering
  group: netpeering
  use: reject netpeering_id
  short: alias for api RejectNetPeering --NetPeeringId netpeering_id
  command:
  - api
  - RejectNetPeering
  - --NetPeeringId
  - '%0'
  - --output
