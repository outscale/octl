- entity: policy
  group: policy
  use: list
  aliases:
  - ls
  short: alias for api ReadPolicies
  command:
  - api
  - ReadPolicies
  - --output
  - table
  flags:
  - name: only-linked
    alias_to: Filters.OnlyLinked
  - name: path-prefix
    alias_to: Filters.PathPrefix
  - name: scope
    alias_to: Filters.Scope
  - name: first-item
    alias_to: FirstItem
- entity: policy
  group: policy
  use: describe policy_orn
  aliases:
  - desc
  short: alias for api ReadPolicy --PolicyOrn policy_orn
  command:
  - api
  - ReadPolicy
  - --PolicyOrn
  - '%0'
  - --output
  - yaml
- entity: policy
  group: policy
  use: create
  short: alias for api CreatePolicy
  command:
  - api
  - CreatePolicy
  - --output
  - yaml
  flags:
  - name: description
    alias_to: Description
  - name: document
    alias_to: Document
    required: true
    type: file
    usage: The file storing the policy document, corresponding to a JSON string that contains the policy.
  - name: path
    alias_to: Path
  - name: name
    alias_to: PolicyName
    required: true
- entity: policy
  group: policy
  use: delete policy_orn
  aliases:
  - del
  short: alias for api DeletePolicy --PolicyOrn policy_orn
  command:
  - api
  - DeletePolicy
  - --PolicyOrn
  - '%0'
  - --output
  - none
  prompt:
    action: delete
    display:
    - api
    - ReadPolicy
    - --PolicyOrn
    - '%0'
    - --output
    - table
- entity: policy
  group: policy
  use: link policy_orn user_name
  short: alias for api LinkPolicy --PolicyOrn policy_orn --UserName user_name
  command:
  - api
  - LinkPolicy
  - --PolicyOrn
  - '%0'
  - --UserName
  - '%1'
