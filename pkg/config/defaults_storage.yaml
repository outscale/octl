  attributes:
    AbortMultipartUploadInput.Bucket:
      help: The bucket name to which the upload was taking place.
      required: true
    AbortMultipartUploadInput.ExpectedBucketOwner:
      help: The account ID of the expected bucket owner.
    AbortMultipartUploadInput.IfMatchInitiatedTime:
      help: If present, this header aborts an in progress multipart upload only if it was initiated on the provided timestamp.
    AbortMultipartUploadInput.Key:
      help: of the object for which the multipart upload was initiated.
      required: true
    AbortMultipartUploadInput.RequestPayer:
      help: Confirms that the requester knows that they will be charged for the request.
    AbortMultipartUploadInput.UploadId:
      help: Upload ID that identifies the multipart upload.
      required: true
    AuthResolverParameters.Operation:
      help: The name of the operation being invoked.
    AuthResolverParameters.Region:
      help: The region in which the operation is being invoked.
    BucketExistsWaiterOptions.APIOptions:
      help: Set of options to modify how an operation is invoked.
    BucketExistsWaiterOptions.ClientOptions:
      help: Functional options to be passed to all operations invoked by this client.
    BucketExistsWaiterOptions.LogWaitAttempts:
      help: is used to enable logging for waiter retry attempts
    BucketExistsWaiterOptions.MaxDelay:
      help: is the maximum amount of time to delay between retries.
    BucketExistsWaiterOptions.MinDelay:
      help: is the minimum amount of time to delay between retries.
    BucketExistsWaiterOptions.Retryable:
      help: is function that can be used to override the service defined waiter-behavior based on operation output, or returned error.
    BucketNotExistsWaiterOptions.APIOptions:
      help: Set of options to modify how an operation is invoked.
    BucketNotExistsWaiterOptions.ClientOptions:
      help: Functional options to be passed to all operations invoked by this client.
    BucketNotExistsWaiterOptions.LogWaitAttempts:
      help: is used to enable logging for waiter retry attempts
    BucketNotExistsWaiterOptions.MaxDelay:
      help: is the maximum amount of time to delay between retries.
    BucketNotExistsWaiterOptions.MinDelay:
      help: is the minimum amount of time to delay between retries.
    BucketNotExistsWaiterOptions.Retryable:
      help: is function that can be used to override the service defined waiter-behavior based on operation output, or returned error.
    ChecksumValidationMetadata.AlgorithmsUsed:
      help: is the set of the checksum algorithms used to validate the response payload.
    CompleteMultipartUploadInput.Bucket:
      help: Name of the bucket to which the multipart upload was initiated.
      required: true
    CompleteMultipartUploadInput.ChecksumCRC32:
      help: This header can be used as a data integrity check to verify that the data received is the same data that was originally sent.
    CompleteMultipartUploadInput.ChecksumCRC32C:
      help: This header can be used as a data integrity check to verify that the data received is the same data that was originally sent.
    CompleteMultipartUploadInput.ChecksumCRC64NVME:
      help: This header can be used as a data integrity check to verify that the data received is the same data that was originally sent.
    CompleteMultipartUploadInput.ChecksumSHA1:
      help: This header can be used as a data integrity check to verify that the data received is the same data that was originally sent.
    CompleteMultipartUploadInput.ChecksumSHA256:
      help: This header can be used as a data integrity check to verify that the data received is the same data that was originally sent.
    CompleteMultipartUploadInput.ChecksumType:
      help: This header specifies the checksum type of the object, which determines how part-level checksums are combined to create an object-level checksum for multipart objects.
    CompleteMultipartUploadInput.ExpectedBucketOwner:
      help: The account ID of the expected bucket owner.
    CompleteMultipartUploadInput.IfMatch:
      help: Uploads the object only if the ETag (entity tag) value provided during the WRITE operation matches the ETag of the object in S3.
    CompleteMultipartUploadInput.IfNoneMatch:
      help: Uploads the object only if the object key name does not already exist in the bucket specified.
    CompleteMultipartUploadInput.Key:
      help: Object key for which the multipart upload was initiated.
      required: true
    CompleteMultipartUploadInput.MpuObjectSize:
      help: The expected total object size of the multipart upload request.
    CompleteMultipartUploadInput.MultipartUpload:
      help: The container for the multipart upload request information.
    CompleteMultipartUploadInput.RequestPayer:
      help: Confirms that the requester knows that they will be charged for the request.
    CompleteMultipartUploadInput.SSECustomerAlgorithm:
      help: The server-side encryption (SSE) algorithm used to encrypt the object.
    CompleteMultipartUploadInput.SSECustomerKey:
      help: The server-side encryption (SSE) customer managed key.
    CompleteMultipartUploadInput.SSECustomerKeyMD5:
      help: The MD5 server-side encryption (SSE) customer managed key.
    CompleteMultipartUploadInput.UploadId:
      help: ID for the initiated multipart upload.
      required: true
    ComputedInputChecksumsMetadata.ComputedChecksums:
      help: is a map of algorithm name to checksum value of the computed input payload's checksums.
    CopyObjectInput.ACL:
      help: The canned access control list (ACL) to apply to the object.
    CopyObjectInput.Bucket:
      help: The name of the destination bucket.
      required: true
    CopyObjectInput.BucketKeyEnabled:
      help: Specifies whether Amazon S3 should use an S3 Bucket Key for object encryption with server-side encryption using Key Management Service (KMS) keys (SSE-KMS).
    CopyObjectInput.CacheControl:
      help: Specifies the caching behavior along the request/reply chain.
    CopyObjectInput.ChecksumAlgorithm:
      help: Indicates the algorithm that you want Amazon S3 to use to create the checksum for the object.
    CopyObjectInput.ContentDisposition:
      help: Specifies presentational information for the object.
    CopyObjectInput.ContentEncoding:
      help: Specifies what content encodings have been applied to the object and thus what decoding mechanisms must be applied to obtain the media-type referenced by the Content-Type header field.
    CopyObjectInput.ContentLanguage:
      help: The language the content is in.
    CopyObjectInput.ContentType:
      help: A standard MIME type that describes the format of the object data.
    CopyObjectInput.CopySource:
      help: Specifies the source object for the copy operation.
      required: true
    CopyObjectInput.CopySourceIfMatch:
      help: Copies the object if its entity tag (ETag) matches the specified tag.
    CopyObjectInput.CopySourceIfModifiedSince:
      help: Copies the object if it has been modified since the specified time.
    CopyObjectInput.CopySourceIfNoneMatch:
      help: Copies the object if its entity tag (ETag) is different than the specified ETag.
    CopyObjectInput.CopySourceIfUnmodifiedSince:
      help: Copies the object if it hasn't been modified since the specified time.
    CopyObjectInput.CopySourceSSECustomerAlgorithm:
      help: Specifies the algorithm to use when decrypting the source object (for example, AES256 ).
    CopyObjectInput.CopySourceSSECustomerKey:
      help: Specifies the customer-provided encryption key for Amazon S3 to use to decrypt the source object.
    CopyObjectInput.CopySourceSSECustomerKeyMD5:
      help: Specifies the 128-bit MD5 digest of the encryption key according to RFC 1321.
    CopyObjectInput.ExpectedBucketOwner:
      help: The account ID of the expected destination bucket owner.
    CopyObjectInput.ExpectedSourceBucketOwner:
      help: The account ID of the expected source bucket owner.
    CopyObjectInput.Expires:
      help: The date and time at which the object is no longer cacheable.
    CopyObjectInput.GrantFullControl:
      help: Gives the grantee READ, READ_ACP, and WRITE_ACP permissions on the object.
    CopyObjectInput.GrantRead:
      help: Allows grantee to read the object data and its metadata.
    CopyObjectInput.GrantReadACP:
      help: Allows grantee to read the object ACL.
    CopyObjectInput.GrantWriteACP:
      help: Allows grantee to write the ACL for the applicable object.
    CopyObjectInput.IfMatch:
