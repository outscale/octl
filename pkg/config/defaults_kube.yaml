entities:
  cluster:
    columns:
    - title: ID
      content: .id
    - title: Name
      content: .name
    - title: Version
      content: .version
    - title: Control Plane
      content: .control_planes
    - title: Status
      content: .statuses.status
    primary: Id
  clustertemplate:
    no_aliases: true
    columns:
    - title: Name
      content: .Tags[] | select(.Key == "Name").Value
  controlplaneplan:
    no_aliases: true
  cpsubregion:
