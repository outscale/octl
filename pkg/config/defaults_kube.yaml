spec:
  calls:
    CreateCluster:
      help: Creates a new cluster with the provided configuration. The request must include the cluster details in the request body. all clusters are associated to a project
    CreateProject:
      help: Creates a new project with the provided details. The request must include the project data in the request body. Returns the details of the created project.
    DeleteCluster:
      help: request returning *DetailResponse
    DeleteProject:
      help: request returning *DetailResponse
    GetCPSubregions:
      help: request returning *CPSubregionsResponse
    GetCluster:
      help: request returning *ClusterResponse
    GetClusterTemplate:
      help: request returning *TemplateResponseClusterInputTemplate
    GetControlPlanePlans:
      help: request returning *ControlPlanesResponse
    GetKubeconfigWithPubkeyNACL:
      help: request returning *KubeconfigResponse
    GetKubernetesVersions:
      help: request returning *KubernetesVersionsResponse
    GetNetPeeringAcceptanceTemplate:
      help: request returning *TemplateResponseNetPeeringAcceptance
    GetNetPeeringRequestTemplate:
      help: request returning *TemplateResponseNetPeeringRequest
    GetNodepoolTemplate:
      help: request returning *TemplateResponseNodepool
    GetProject:
      help: request returning *ProjectResponse
    GetProjectTemplate:
      help: request returning *TemplateResponseProjectInput
    ListProjects:
      help: request returning *ProjectResponseList
    UpdateCluster:
      help: Updates the configuration of an existing cluster by its ID. The request must include the updated cluster details in the request body. Returns the updated cluster information
    UpdateProject:
      help: Updates the details of an existing project by its ID. The request must include the updated project data in the request body. Returns the updated project information.
    UpgradeCluster:
      help: request returning *ClusterResponse
  attributes:
    AdmissionFlags.AppliedAdmissionPlugins:
      help: List of admission plugins currently applied to the cluster
    AdmissionFlags.DisableAdmissionPlugins:
      help: List of Kubernetes admission plugins that are disabled
    AdmissionFlags.EnableAdmissionPlugins:
      help: List of Kubernetes admission plugins that are enabled
    AdmissionFlagsInput.DisableAdmissionPlugins:
      help: List of Kubernetes admission plugins to disable
    AdmissionFlagsInput.EnableAdmissionPlugins:
      help: List of Kubernetes admission plugins to enable
    AuthStrategy.Oidc:
      help: Configuration for authenticating to the cluster using OpenID Connect (OIDC).
    AutoMaintenances.MinorUpgradeMaintenance:
      help: Maintenance window configuration for minor Kubernetes upgrades
    AutoMaintenances.PatchUpgradeMaintenance:
      help: Maintenance window configuration for patch Kubernetes upgrades
    AutoUpgradeMaintenance.DurationHours:
      help: Duration of the maintenance window in hours
    AutoUpgradeMaintenance.StartHour:
      help: Hour of the day when maintenance window starts (0-23)
    AutoUpgradeMaintenance.WeekDay:
      help: Day of the week for the maintenance window (e.g., Mon, Tue)
    Cluster.AdminLbu:
      help: Flag indicating if admin load balancer is enabled for cluster management
    Cluster.AdminWhitelist:
      help: List of CIDR blocks or IP addresses allowed to access the Kubernetes API
    Cluster.AdmissionFlags:
      help: Configuration for Kubernetes admission controllers
    Cluster.CidrPods:
      help: CIDR block for Kubernetes pods network
    Cluster.CidrService:
      help: CIDR block for Kubernetes services network
    Cluster.ClusterDns:
      help: IP address for cluster DNS service
    Cluster.Cni:
      help: Container Network Interface used in the cluster
    Cluster.ControlPlanes:
      help: Type of control plane deployment for the cluster
    Cluster.CpMultiAz:
      help: Flag indicating if multi-availability zone is enabled for the control plane
    Cluster.CpSubregions:
      help: Subregions where control plane components are deployed
    Cluster.Description:
      help: Optional description of the cluster
    Cluster.DisableApiTermination:
      help: Flag to prevent accidental cluster deletion
    Cluster.Id:
      help: Unique UUID of the cluster
    Cluster.Name:
      help: Unique cluster name per project
    Cluster.ProjectId:
      help: Unique identifier of the project this cluster belongs to
    Cluster.Statuses:
      help: Current status information about the cluster
    Cluster.Tags:
      help: Key-value pairs for cluster metadata
    Cluster.Version:
      help: Version of Kubernetes deployed in the cluster
    ClusterInput.AdminLbu:
      help: Flag to enable admin load balancer for cluster management
    ClusterInput.AdminWhitelist:
      help: List of CIDR blocks or IP addresses allowed to access the Kubernetes API
